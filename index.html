<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop - Home</title>
    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <img src="./assets/img/logo.svg" alt="Shop Logo" />
      </div>
      <div class="list">
        <ul>
          <li>
            <a href="#">Home</a>
          </li>
          <li>
            <a href="#shop">Shop</a>
          </li>
          <li>
            <a href="#">About</a>
          </li>
          <li>
            <a href="#">Contact</a>
          </li>
        </ul>
      </div>
      <div class="item">
        <ul>
          <li>
            <img src="./assets/img/img/Line Rounded/Search.svg" alt="Search" />
          </li>
          <li>
            <img
              src="./assets/img/img/Line Rounded/Avatar.svg"
              alt="User Account"
            />
          </li>
          <li>
            <img
              src="./assets/img/img/Line Rounded/Heart.svg"
              alt="Favorites"
            />
          </li>
          <li>
            <img
              src="./assets/img/img/Line Rounded/Shopping cart.svg"
              alt="Shopping Cart"
            />
          </li>
        </ul>
      </div>
    </div>

    <div class="collections">
      <div class="collection">
        <img src="./assets/img/TABLEWARE.svg" alt="Tableware Collection" />
        
      </div>
      <div class="collection">
        <img src="./assets/img/HOME DECOR.svg" alt="Home Decor Collection" />
        
      </div>
      <div class="collection">
        <img src="./assets/img/HOLIDAY.svg" alt="Holiday Collection" />
        
      </div>
      <div class="collection">
        <img src="./assets/img/COLLECTION.svg" alt="All Collections" />
         
      </div>
    </div>
  </body>
</html>
